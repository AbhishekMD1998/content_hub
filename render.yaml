# Render Blueprint — Spring Boot via Docker (Render has no native Java runtime)
# Docs: https://render.com/docs/docker
services:
  - type: web
    name: content-hub-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Render is IPv4-only — copy exact pooler host from Supabase → Connect → Session pooler
      - key: SUPABASE_PROJECT_REF
        value: ddppgnmbiwibscgfxaxv
      - key: SUPABASE_POOLER_HOST
        value: aws-1-ap-northeast-1.pooler.supabase.com
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
