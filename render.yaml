# Render Blueprint — Spring Boot via Docker (Render has no native Java runtime)
# Docs: https://render.com/docs/docker
services:
  - type: web
    name: content-hub-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/articles
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
