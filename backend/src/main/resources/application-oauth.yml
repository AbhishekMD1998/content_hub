# Activated when GOOGLE_CLIENT_ID is set (see scripts/start-backend.sh)
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
        provider:
          google:
            user-name-attribute: email
