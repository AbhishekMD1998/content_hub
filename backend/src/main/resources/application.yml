server:
  port: ${PORT:8080}

spring:
  application:
    name: content-hub-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/content_hub}
    username: ${DATABASE_USERNAME:contenthub}
    password: ${DATABASE_PASSWORD:contenthub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
