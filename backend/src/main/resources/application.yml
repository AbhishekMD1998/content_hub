server:
  port: ${PORT:8080}
  # Required behind Render/nginx so Google OAuth redirect URIs use https
  forward-headers-strategy: framework

spring:
  application:
    name: content-hub-api
  datasource:
    # Must be set in Render Environment (Supabase). Local: backend/.env
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Supabase: if you ran supabase/schema.sql manually, Flyway baselines instead of failing.
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
